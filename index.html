*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0e0e10;
  --surface: #17171a;
  --border: #2a2a2e;
  --border-focus: #5a5aff;
  --text: #e8e8ec;
  --muted: #5a5a6a;
  --accent: #5a5aff;
  --error: #ff5a5a;
  --success: #5affb0;
}

body {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size: 48px 48px;
  opacity: 0.35;
  pointer-events: none;
}

.card {
  position: relative;
  width: 360px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 40px 36px;
  animation: fadeUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

.card::before {
  content: '';
  position: absolute;
  top: -1px; left: 50%;
  transform: translateX(-50%);
  width: 60%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
}

h1 {
  font-family: 'DM Mono', monospace;
  font-size: 1.1rem;
  font-weight: 500;
  letter-spacing: 0.06em;
  margin-bottom: 32px;
  color: var(--text);
}

h1 span { color: var(--accent); }

.field {
  margin-bottom: 16px;
}

label {
  display: block;
  font-size: 0.72rem;
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.08em;
  color: var(--muted);
  margin-bottom: 7px;
  text-transform: uppercase;
}

input {
  width: 100%;
  padding: 10px 14px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 7px;
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 0.88rem;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}

input:focus {
  border-color: var(--border-focus);
  box-shadow: 0 0 0 3px rgba(90, 90, 255, 0.12);
}

.msg {
  min-height: 18px;
  font-size: 0.75rem;
  font-family: 'DM Mono', monospace;
  margin-top: 12px;
  margin-bottom: 4px;
  transition: opacity 0.2s;
  color: var(--error);
}

.msg.success { color: var(--success); }

button {
  width: 100%;
  margin-top: 8px;
  padding: 11px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 7px;
  font-family: 'DM Mono', monospace;
  font-size: 0.88rem;
  font-weight: 500;
  letter-spacing: 0.05em;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.15s;
}

button:hover  { opacity: 0.88; }
button:active { transform: scale(0.98); }

button.loading {
  opacity: 0.6;
  pointer-events: none;
}

@keyframes shake {
  0%,100% { transform: translateX(0); }
  20%      { transform: translateX(-6px); }
  40%      { transform: translateX(6px); }
  60%      { transform: translateX(-4px); }
  80%      { transform: translateX(4px); }
}
.shake { animation: shake 0.35s ease; }

<body>

<div class="card" id="card">
  <h1>_ <span>sign in</span></h1>

  <div class="field">
    <label for="uid">User ID</label>
    <input type="text" id="uid" autocomplete="username" spellcheck="false" placeholder="Enter your ID">
  </div>

  <div class="field">
    <label for="pw">Password</label>
    <input type="password" id="pw" autocomplete="current-password" placeholder="Enter your password">
  </div>

  <div class="msg" id="msg"></div>

<button id="btn" onclick="handleLogin()">Login</button>

</div>

<script>
  
  const HASH_ID = "122ed4e40a69245b12fb564feeb884d416e2507f16d4ed8ff3092929ce20d87a";
  const HASH_PW = "dd2a5762bf6d578e30b49b39b0bba6b156be503d6cb3115077e9a70fd47208b6";

   const REDIRECT_URL = "canvas.html";

  async function sha256(str) {
    const buf = await crypto.subtle.digest(
      "SHA-256",
      new TextEncoder().encode(str)
    );
    return Array.from(new Uint8Array(buf))
      .map(b => b.toString(16).padStart(2, "0"))
      .join("");
  }

  async function handleLogin() {
    const id   = document.getElementById("uid").value.trim();
    const pw   = document.getElementById("pw").value;
    const msg  = document.getElementById("msg");
    const btn  = document.getElementById("btn");
    const card = document.getElementById("card");

    if (!id || !pw) {
      msg.textContent = "ID とパスワードを入力してください。";
      msg.className = "msg";
      return;
    }

    btn.classList.add("loading");
    btn.textContent = "Verifying...";

    const [hashId, hashPw] = await Promise.all([sha256(id), sha256(pw)]);

    await new Promise(r => setTimeout(r, 400));

    if (hashId === HASH_ID && hashPw === HASH_PW) {
      msg.textContent = "SUCCESS";
      msg.className = "msg success";
      btn.textContent = "Redirecting...";

      setTimeout(() => {
         window.location.href = REDIRECT_URL;
        btn.classList.remove("loading");
        btn.textContent = "Login";
      }, 800);
    } else {
      msg.textContent = "Invaild ID or Password";
      msg.className = "msg";
      card.classList.remove("shake");
      void card.offsetWidth; // reflow
      card.classList.add("shake");
      btn.classList.remove("loading");
      btn.textContent = "Login";
    }
  }

  // Enterキー対応
  document.addEventListener("keydown", e => {
    if (e.key === "Enter") handleLogin();
  });
</script>

</body>
</html>
