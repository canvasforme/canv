<!DOCTYPE html>

<html lang="ja">
<head>
  <!--CREATED BY CLAUDE-->
  
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Explorer for science</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;700&family=Shippori+Mincho:wght@400;600&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
–plant-primary: #2d6a4f;
–plant-accent: #74c69d;
–plant-glow: #52b788;
–animal-primary: #1a3a5c;
–animal-accent: #4fc3f7;
–animal-glow: #29b6f6;
–bg: #080c10;
–surface: rgba(255,255,255,0.04);
–border: rgba(255,255,255,0.08);
–text: #e8f0fe;
–text-dim: rgba(232,240,254,0.5);
}

html, body { width: 100%; height: 100%; background: var(–bg); overflow: hidden; font-family: ‘Zen Kaku Gothic New’, sans-serif; color: var(–text); }

#app { width: 100%; height: 100%; display: flex; flex-direction: column; position: relative; }

/* ── Header ── */
header {
position: relative; z-index: 20; padding: 14px 24px 0;
display: flex; align-items: center; justify-content: space-between;
background: linear-gradient(180deg, rgba(8,12,16,0.95) 0%, transparent 100%);
pointer-events: none;
}
.logo { font-family: ‘Shippori Mincho’, serif; font-size: 1.05rem; letter-spacing: 0.15em; color: var(–text-dim); }
.logo span { color: var(–text); font-weight: 600; }

/* ── Tab ── */
.tabs {
position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
z-index: 30; display: flex; gap: 4px;
background: rgba(255,255,255,0.05); border: 1px solid var(–border);
border-radius: 100px; padding: 4px; pointer-events: all;
backdrop-filter: blur(12px);
}
.tab {
padding: 8px 26px; border-radius: 100px; border: none; cursor: pointer;
font-family: ‘Zen Kaku Gothic New’, sans-serif; font-size: 0.88rem; font-weight: 700;
letter-spacing: 0.08em; transition: all 0.35s cubic-bezier(.4,0,.2,1);
color: var(–text-dim); background: transparent;
}
.tab.active-plant { background: var(–plant-primary); color: #fff; box-shadow: 0 0 20px rgba(82,183,136,0.4); }
.tab.active-animal { background: var(–animal-primary); color: #fff; box-shadow: 0 0 20px rgba(41,182,246,0.4); }

/* ── Canvas ── */
#canvas-container { flex: 1; position: relative; }
#canvas-container canvas { display: block; }

/* ── Controls hint ── */
.hint {
position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
z-index: 20; display: flex; gap: 16px; pointer-events: none;
}
.hint-item {
display: flex; align-items: center; gap: 6px; font-size: 0.72rem; color: var(–text-dim);
background: rgba(255,255,255,0.04); border: 1px solid var(–border);
padding: 6px 12px; border-radius: 100px; backdrop-filter: blur(8px);
}
.hint-icon { font-size: 0.85rem; }

/* ── Modal / Detail Panel ── */
.panel-overlay {
position: fixed; inset: 0; z-index: 100;
display: flex; align-items: flex-end; justify-content: center;
pointer-events: none; opacity: 0; transition: opacity 0.3s;
}
.panel-overlay.open { opacity: 1; pointer-events: all; }
.panel-overlay.open .panel { transform: translateY(0); }

.panel-bg {
position: absolute; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
}
.panel {
position: relative; z-index: 1;
width: 100%; max-width: 580px; max-height: 75vh;
background: linear-gradient(160deg, rgba(14,22,32,0.98) 0%, rgba(8,12,16,0.99) 100%);
border: 1px solid var(–border); border-bottom: none;
border-radius: 24px 24px 0 0;
padding: 28px 28px 40px;
overflow-y: auto; overflow-x: hidden;
transform: translateY(100%); transition: transform 0.45s cubic-bezier(.4,0,.2,1);
}

.panel-handle {
width: 40px; height: 4px; background: var(–border); border-radius: 2px;
margin: 0 auto 22px;
}

.panel-badge {
display: inline-flex; align-items: center; gap: 6px;
font-size: 0.7rem; font-weight: 700; letter-spacing: 0.12em;
padding: 4px 10px; border-radius: 100px; margin-bottom: 10px;
text-transform: uppercase;
}
.badge-plant { background: rgba(82,183,136,0.15); color: var(–plant-accent); border: 1px solid rgba(82,183,136,0.3); }
.badge-animal { background: rgba(41,182,246,0.15); color: var(–animal-accent); border: 1px solid rgba(41,182,246,0.3); }

.panel h2 { font-family: ‘Shippori Mincho’, serif; font-size: 1.6rem; font-weight: 600; margin-bottom: 6px; line-height: 1.3; }
.panel .subtitle { font-size: 0.82rem; color: var(–text-dim); margin-bottom: 20px; letter-spacing: 0.05em; }

.panel-desc { font-size: 0.92rem; line-height: 1.85; color: rgba(232,240,254,0.85); margin-bottom: 22px; }

.section-title {
font-size: 0.72rem; font-weight: 700; letter-spacing: 0.14em;
text-transform: uppercase; color: var(–text-dim); margin-bottom: 10px;
}

.examples { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 22px; }
.example-chip {
padding: 5px 14px; border-radius: 100px; font-size: 0.82rem;
background: var(–surface); border: 1px solid var(–border);
transition: all 0.2s;
}

.features { display: flex; flex-direction: column; gap: 8px; }
.feature {
display: flex; align-items: flex-start; gap: 12px;
padding: 10px 14px; border-radius: 12px;
background: var(–surface); border: 1px solid var(–border);
}
.feature-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 1px; }
.feature-text { font-size: 0.85rem; line-height: 1.6; color: rgba(232,240,254,0.8); }

.panel-close {
position: absolute; top: 20px; right: 20px;
width: 32px; height: 32px; border-radius: 50%;
background: var(–surface); border: 1px solid var(–border);
color: var(–text-dim); font-size: 1rem; cursor: pointer;
display: flex; align-items: center; justify-content: center;
transition: all 0.2s;
}
.panel-close:hover { background: rgba(255,255,255,0.1); color: var(–text); }

/* ── Node tooltip (hover) ── */
#tooltip {
position: fixed; z-index: 50; pointer-events: none;
padding: 8px 14px; border-radius: 10px;
background: rgba(14,22,32,0.92); border: 1px solid var(–border);
font-size: 0.82rem; backdrop-filter: blur(8px);
opacity: 0; transition: opacity 0.15s;
white-space: nowrap;
}

/* Scrollbar */
.panel::-webkit-scrollbar { width: 4px; }
.panel::-webkit-scrollbar-track { background: transparent; }
.panel::-webkit-scrollbar-thumb { background: var(–border); border-radius: 2px; }
</style>

</head>
<body>
<div id="app">
  <header>
    <div class="logo"><span>生物分類</span> 3D Explorer</div>
  </header>

  <div class="tabs">
    <button class="tab active-plant" onclick="switchTab('plant')">🌿 植物</button>
    <button class="tab" onclick="switchTab('animal')">🦎 動物</button>
  </div>

  <div id="canvas-container"></div>

  <div class="hint">
    <div class="hint-item"><span class="hint-icon">👆</span>ドラッグで回転</div>
    <div class="hint-item"><span class="hint-icon">🤏</span>ピンチ/ホイールでズーム</div>
    <div class="hint-item"><span class="hint-icon">✨</span>ノードをタップで詳細</div>
  </div>
</div>

<div id="tooltip"></div>

<!-- Detail Panel -->

<div class="panel-overlay" id="panel-overlay">
  <div class="panel-bg" onclick="closePanel()"></div>
  <div class="panel" id="detail-panel">
    <div class="panel-handle"></div>
    <button class="panel-close" onclick="closePanel()">✕</button>
    <div id="panel-content"></div>
  </div>
</div>

// ORBIT CONTROLS (manual)
// ═══════════════════════════════════════════
let isDragging = false, prevX = 0, prevY = 0;
let rotX = 0.2, rotY = 0;
let targetRotX = 0.2, targetRotY = 0;
let zoom = 22, targetZoom = 22;
let touchDist = null;

const pivot = new THREE.Group();
scene.add(pivot);

renderer.domElement.addEventListener('mousedown', e => { isDragging = true; prevX = e.clientX; prevY = e.clientY; });
window.addEventListener('mouseup', () => isDragging = false);
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  targetRotY += (e.clientX - prevX) * 0.008;
  targetRotX += (e.clientY - prevY) * 0.008;
  targetRotX = Math.max(-1.2, Math.min(1.2, targetRotX));
  prevX = e.clientX; prevY = e.clientY;
});
renderer.domElement.addEventListener('wheel', e => {
  targetZoom += e.deltaY * 0.05;
  targetZoom = Math.max(8, Math.min(40, targetZoom));
});
renderer.domElement.addEventListener('touchstart', e => {
  if (e.touches.length === 1) { isDragging = true; prevX = e.touches[0].clientX; prevY = e.touches[0].clientY; }
  if (e.touches.length === 2) { touchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); }
}, { passive: true });
renderer.domElement.addEventListener('touchend', () => { isDragging = false; touchDist = null; }, { passive: true });
renderer.domElement.addEventListener('touchmove', e => {
  if (e.touches.length === 1 && isDragging) {
    targetRotY += (e.touches[0].clientX - prevX) * 0.008;
    targetRotX += (e.touches[0].clientY - prevY) * 0.008;
    targetRotX = Math.max(-1.2, Math.min(1.2, targetRotX));
    prevX = e.touches[0].clientX; prevY = e.touches[0].clientY;
  }
  if (e.touches.length === 2 && touchDist !== null) {
    const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    targetZoom -= (d - touchDist) * 0.05;
    targetZoom = Math.max(8, Math.min(40, targetZoom));
    touchDist = d;
  }
}, { passive: true });

// ═══════════════════════════════════════════
// NODE BUILDING
// ═══════════════════════════════════════════
const COLORS = {
  plant: [0x52b788, 0x40916c, 0x2d6a4f, 0x1b4332, 0x081c15],
  animal: [0x4fc3f7, 0x0288d1, 0x01579b, 0x0d47a1, 0x001970]
};
const SIZES = [1.4, 1.05, 0.82, 0.65, 0.52];

let nodeObjects = [];
let edgeObjects = [];
let currentTab = 'plant';
let labelSprites = [];

function makeSprite(text, color) {
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = 512; canvas.height = 128;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = `rgba(8,12,16,0.75)`;
  ctx.beginPath(); ctx.roundRect(8, 20, canvas.width - 16, canvas.height - 36, 18);
  ctx.fill();
  ctx.strokeStyle = color; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.roundRect(8, 20, canvas.width - 16, canvas.height - 36, 18);
  ctx.stroke();
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 38px "Zen Kaku Gothic New", sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(text, canvas.width / 2, canvas.height / 2 + 2);
  const tex = new THREE.CanvasTexture(canvas);
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(5, 1.25, 1);
  return sprite;
}

function buildTree(data, tab) {
  // clear
  nodeObjects.forEach(o => pivot.remove(o.mesh));
  edgeObjects.forEach(o => pivot.remove(o));
  labelSprites.forEach(s => pivot.remove(s));
  nodeObjects = []; edgeObjects = []; labelSprites = [];

  const palette = COLORS[tab];

  function placeNode(node, pos, parentPos, depth) {
    const size = SIZES[Math.min(depth, SIZES.length - 1)];
    const col = palette[Math.min(depth, palette.length - 1)];

    const geo = new THREE.SphereGeometry(size, 28, 28);
    const mat = new THREE.MeshStandardMaterial({
      color: col, emissive: col, emissiveIntensity: 0.25,
      metalness: 0.3, roughness: 0.55,
      transparent: true, opacity: 0.92
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.copy(pos);
    pivot.add(mesh);

    // Glow ring
    const ringGeo = new THREE.RingGeometry(size + 0.08, size + 0.22, 32);
    const ringMat = new THREE.MeshBasicMaterial({ color: col, side: THREE.DoubleSide, transparent: true, opacity: 0.35 });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = Math.PI / 2;
    mesh.add(ring);

    // Label
    const hexColor = '#' + col.toString(16).padStart(6, '0');
    const sprite = makeSprite(node.label, hexColor);
    sprite.position.set(pos.x, pos.y + size + 1.0, pos.z);
    pivot.add(sprite);
    labelSprites.push(sprite);

    // Edge to parent
    if (parentPos) {
      const dir = new THREE.Vector3().subVectors(pos, parentPos);
      const mid = new THREE.Vector3().addVectors(parentPos, pos).multiplyScalar(0.5);
      const len = dir.length();
      const edgeGeo = new THREE.CylinderGeometry(0.04, 0.04, len, 8);
      const edgeMat = new THREE.MeshBasicMaterial({ color: col, transparent: true, opacity: 0.3 });
      const edge = new THREE.Mesh(edgeGeo, edgeMat);
      edge.position.copy(mid);
      edge.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir.clone().normalize());
      pivot.add(edge);
      edgeObjects.push(edge);
    }

    nodeObjects.push({ mesh, data: node, baseColor: col, baseEmissive: 0.25 });

    // Children
    if (node.children && node.children.length > 0) {
      const n = node.children.length;
      const radius = 4.5 + depth * 1.5;
      const yStep = -3.8;
      node.children.forEach((child, i) => {
        const angle = (i / n) * Math.PI * 2 - Math.PI / 2;
        const childPos = new THREE.Vector3(
          pos.x + Math.cos(angle) * radius,
          pos.y + yStep,
          pos.z + Math.sin(angle) * radius
        );
        placeNode(child, childPos, pos, depth + 1);
      });
    }
  }

  placeNode(data, new THREE.Vector3(0, 6, 0), null, 0);
}

// ═══════════════════════════════════════════
// RAYCASTING / CLICK
// ═══════════════════════════════════════════
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let hoveredNode = null;
const tooltip = document.getElementById('tooltip');

function getIntersected(cx, cy) {
  mouse.x = (cx / container.clientWidth) * 2 - 1;
  mouse.y = -(cy / container.clientHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const meshes = nodeObjects.map(n => n.mesh);
  const hits = raycaster.intersectObjects(meshes, false);
  if (hits.length > 0) return nodeObjects.find(n => n.mesh === hits[0].object);
  return null;
}

renderer.domElement.addEventListener('mousemove', e => {
  const hit = getIntersected(e.clientX, e.clientY);
  if (hit) {
    renderer.domElement.style.cursor = 'pointer';
    tooltip.style.opacity = '1';
    tooltip.style.left = (e.clientX + 14) + 'px';
    tooltip.style.top = (e.clientY - 10) + 'px';
    tooltip.textContent = hit.data.label + (hit.data.en ? '  ' + hit.data.en : '');
    if (hoveredNode && hoveredNode !== hit) resetNodeColor(hoveredNode);
    hoverNode(hit);
    hoveredNode = hit;
  } else {
    renderer.domElement.style.cursor = 'default';
    tooltip.style.opacity = '0';
    if (hoveredNode) { resetNodeColor(hoveredNode); hoveredNode = null; }
  }
});

function hoverNode(n) {
  n.mesh.material.emissiveIntensity = 0.8;
  n.mesh.scale.setScalar(1.15);
}
function resetNodeColor(n) {
  n.mesh.material.emissiveIntensity = n.baseEmissive;
  n.mesh.scale.setScalar(1);
}

let clickStart = { x: 0, y: 0 };
renderer.domElement.addEventListener('mousedown', e => { clickStart = { x: e.clientX, y: e.clientY }; });
renderer.domElement.addEventListener('mouseup', e => {
  if (Math.abs(e.clientX - clickStart.x) < 5 && Math.abs(e.clientY - clickStart.y) < 5) {
    const hit = getIntersected(e.clientX, e.clientY);
    if (hit) openPanel(hit.data);
  }
});

renderer.domElement.addEventListener('touchend', e => {
  if (e.changedTouches.length === 1) {
    const t = e.changedTouches[0];
    const hit = getIntersected(t.clientX, t.clientY);
    if (hit) openPanel(hit.data);
  }
}, { passive: true });

function openPanel(data) {
  const isPlant = currentTab === 'plant';
  const badgeClass = isPlant ? 'badge-plant' : 'badge-animal';
  const badgeLabel = isPlant ? '植物界' : '動物界';

  const exHtml = (data.examples || []).map(e =>
    `<span class="example-chip">${e}</span>`
  ).join('');

  const featHtml = (data.features || []).map(f =>
    `<div class="feature"><span class="feature-icon">${f.icon}</span><span class="feature-text">${f.text}</span></div>`
  ).join('');

  document.getElementById('panel-content').innerHTML = `
    <span class="panel-badge ${badgeClass}">${badgeLabel}</span>
    <h2>${data.label}</h2>
    <p class="subtitle">${data.en || ''}</p>
    <p class="panel-desc">${data.desc}</p>
    ${featHtml ? `<p class="section-title">特徴</p><div class="features">${featHtml}</div>` : ''}
    ${exHtml ? `<p class="section-title" style="margin-top:18px">代表例</p><div class="examples">${exHtml}</div>` : ''}
  `;
  document.getElementById('panel-overlay').classList.add('open');
}

function closePanel() {
  document.getElementById('panel-overlay').classList.remove('open');
}

// ═══════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════
function switchTab(tab) {
  currentTab = tab;
  const tabs = document.querySelectorAll('.tab');
  tabs.forEach(t => t.className = 'tab');
  if (tab === 'plant') {
    tabs[0].classList.add('active-plant');
    pointA.color.set(0x52b788); pointB.color.set(0x40916c);
    buildTree(PLANT_DATA, 'plant');
  } else {
    tabs[1].classList.add('active-animal');
    pointA.color.set(0x29b6f6); pointB.color.set(0x4fc3f7);
    buildTree(ANIMAL_DATA, 'animal');
  }
  targetRotX = 0.2; targetRotY = 0;
  targetZoom = 22;
  closePanel();
}

// ═══════════════════════════════════════════
// RESIZE
// ═══════════════════════════════════════════
window.addEventListener('resize', () => {
  camera.aspect = container.clientWidth / container.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(container.clientWidth, container.clientHeight);
});

// ═══════════════════════════════════════════
// ANIMATE
// ═══════════════════════════════════════════
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  // Smooth orbit
  rotX += (targetRotX - rotX) * 0.08;
  rotY += (targetRotY - rotY) * 0.08;
  zoom += (targetZoom - zoom) * 0.08;
  pivot.rotation.x = rotX;
  pivot.rotation.y = rotY;
  camera.position.z = zoom;

  // Pulse nodes
  nodeObjects.forEach((n, i) => {
    if (n === hoveredNode) return;
    const pulse = 1 + 0.04 * Math.sin(t * 1.5 + i * 0.7);
    n.mesh.scale.setScalar(pulse);
  });

  // Keep labels facing camera
  labelSprites.forEach(s => { s.material.rotation = 0; });

  renderer.render(scene, camera);
}

// Init
buildTree(PLANT_DATA, 'plant');
animate();
</script>

</body>
